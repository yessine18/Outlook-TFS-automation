<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PFE Helpdesk | Automation Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="container">
        <header>
            <div class="logo-area">
                <i class="fa-solid fa-bolt-lightning main-logo"></i>
                <h1>Helpdesk <span>Pipeline</span></h1>
            </div>
            <div class="status-indicator">
                <span class="pulse"></span> Live Monitoring
            </div>
        </header>

        <section class="stats-grid">
            <div class="stat-card">
                <i class="fa-solid fa-inbox"></i>
                <div class="stat-info">
                    <p class="stat-label">Total Emails</p>
                    <h2 id="total-tickets">--</h2>
                </div>
            </div>
            <div class="stat-card">
                <i class="fa-solid fa-check-double"></i>
                <div class="stat-info">
                    <p class="stat-label">Processed (ADO)</p>
                    <h2 id="processed-count">--</h2>
                </div>
            </div>
            <div class="stat-card">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <div class="stat-info">
                    <p class="stat-label">Failures</p>
                    <h2 id="failed-count">--</h2>
                </div>
            </div>
        </section>

        <section class="tickets-section">
            <div class="table-header">
                <h2>Recent Pipeline Operations</h2>
                <button id="refresh-btn" class="btn-refresh"><i class="fa-solid fa-rotate"></i> Refresh</button>
            </div>
            <div class="table-container shadow-vibrant">
                <table id="tickets-table">
                    <thead>
                        <tr>
                            <th>Received At</th>
                            <th>Subject</th>
                            <th>Sender</th>
                            <th>Department</th>
                            <th>ADO Item</th>
                            <th>ADO State</th>
                            <th>Pipeline</th>
                        </tr>
                    </thead>
                    <tbody id="tickets-body">
                        <!-- Rows will be injected here via JavaScript -->
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
